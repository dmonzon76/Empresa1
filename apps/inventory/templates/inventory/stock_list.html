{% extends "core/bases/base.html" %}

{% block content %}
<a href="javascript:history.back()" class="btn btn-outline-secondary mb-3">← Back</a>
<h2>Inventory</h2>

<table class="table">
    <thead>
        <tr>
            <th>Product</th>
            <th>Stock</th>
            <th>Minimum</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for item in items %}
        <tr>
            <td>{{ item.product.name }}</td>
            <td>{{ item.quantity }}</td>
            <td>{{ item.min_stock }}</td>
            <td>
                <a href="{% url 'inventory:stock_detail' item.id %}" class="btn btn-sm btn-primary">See</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
