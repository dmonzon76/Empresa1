{% extends "core/bases/base_form.html" %}
{% load static %}

{% block content %}
<div class="container mt-4">
    <h2>{% if view.object %}Edit Customer{% else %}New Customer{% endif %}</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'customers:list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
