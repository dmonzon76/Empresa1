{% extends "core/bases/base.html" %}

{% block content %}
<a href="javascript:history.back()" class="btn btn-outline-secondary mb-3">← Back</a>
<div class="dashboard-header">
    <h2 class="dashboard-title">Delete Address</h2>
</div>

<div class="dashboard-card">
    <div class="dashboard-card-body">
        <p>Are you sure you want to delete this address?</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'addresses:address_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
