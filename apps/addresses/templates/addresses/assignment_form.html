{% extends "core/bases/base.html" %}

{% block content %}
<div class="dashboard-header">
    <h2 class="dashboard-title">
        {% if form.instance.pk %}Edit Assignment{% else %}New Assignment{% endif %}
    </h2>
</div>

<div class="dashboard-card">
    <div class="dashboard-card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">
                {% if form.instance.pk %}Save Changes{% else %}Create Assignment{% endif %}
            </button>

            <a href="{% url 'addresses:assignment_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
