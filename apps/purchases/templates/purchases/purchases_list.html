{% extends "purchases/base_purchases.html" %}
{% block purchases_content %}
<h1>Purchase Orders</h1>
<ul>
    {% for po in purchase_orders %}
    <li>
        <a href="{% url 'purchases_html:detail' po.pk %}">
            {{ po.number }} - {{ po.supplier }} - {{ po.total_amount }}
        </a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
