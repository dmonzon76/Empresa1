{% extends "core/bases/base.html" %}

{% block content %}
<div class="container mt-4">
    <a href="javascript:history.back()" class="btn btn-outline-secondary mb-3">← Back</a>
    <h1>Journal Entries</h1>

    <table class="table table-striped mt-3">
        <thead>
            <tr>
                <th>Date</th>
                <th>Entry #</th>
                <th>Description</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for entry in journal_entries %}
            <tr>
                <td>{{ entry.date }}</td>
                <td>{{ entry.pk }}</td>
                <td>{{ entry.description }}</td>
                <td>
                    <a href="{% url 'accounting:journal_detail' entry.pk %}" class="btn btn-sm btn-outline-primary">
                        View
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
