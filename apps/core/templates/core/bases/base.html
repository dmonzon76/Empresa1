<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Administrative Panel{% endblock %}</title>

    {% load static %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'core/css/base.css' %}">

    {% block extra_css %}{% endblock %}
</head>

<body>
    {% include "core/includes/navbar.html" %}

    <div class="layout-wrapper">

        {% include "core/includes/sidebar.html" %}

        <main class="main-content">
            {% block content %}
<a href="#" onclick="window.history.back(); return false;" class="btn btn-outline-secondary mb-3">← Back</a>{% endblock %}
        </main>

    </div>

    {% include "core/includes/footer.html" %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
