{% extends "bases/base.html" %}

{% block content %}
<h3>Are you sure you want to delete "{{ object }}"?</h3>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Delete</button>
    <a href="javascript:history.back()" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
