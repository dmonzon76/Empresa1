{% extends "core/bases/base.html" %}

{% block content %}
<div class="dashboard-header">
    <h2 class="dashboard-title">Delete Product Category</h2>
</div>

<div class="dashboard-card">
    <div class="dashboard-card-body">
        <p>Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{% url 'categories:products_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
