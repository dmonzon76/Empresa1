{% extends "core/bases/base.html" %}

{% block content %}
<div class="dashboard-header">
    <h2 class="dashboard-title">Product Categories</h2>
</div>

<div class="dashboard-card">
    <div class="dashboard-card-header d-flex justify-content-between">
        <span class="dashboard-card-title">List</span>
        <a href="{% url 'categories:products_create' %}" class="btn btn-primary btn-sm">New Category</a>
    </div>

    <div class="dashboard-card-body">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Name</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                {% for category in object_list %}
                <tr>
                    <td>{{ category.name }}</td>
                    <td>
                        <a href="{% url 'categories:products_edit' category.id %}" class="btn btn-sm btn-outline-primary">Edit</a>
                        <a href="{% url 'categories:products_delete' category.id %}" class="btn btn-sm btn-outline-danger">Delete</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center text-muted">No categories found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
