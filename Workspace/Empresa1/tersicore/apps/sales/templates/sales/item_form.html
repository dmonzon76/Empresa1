{% extends "base/base.html" %}

{% block content %}
<div class="dashboard-header">
    <h2 class="dashboard-title">Add Item</h2>
</div>

<div class="dashboard-card">
    <div class="dashboard-card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">Add</button>
        </form>
    </div>
</div>
{% endblock %}
