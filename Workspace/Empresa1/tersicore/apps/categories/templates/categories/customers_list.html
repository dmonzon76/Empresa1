{% extends "bases/base.html" %}

{% block content %}
<h2>Customer Categories</h2>

<a href="{% url 'categories:customers_create' %}" class="btn btn-primary mb-3">Add Category</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Prefix</th>
            <th>Sequence</th>
            <th>Active</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for c in categories %}
        <tr>
            <td>{{ c.name }}</td>
            <td>{{ c.prefix }}</td>
            <td>{{ c.sequence }}</td>
            <td>{{ c.is_active }}</td>
            <td>
                <a href="{% url 'categories:customers_edit' c.pk %}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{% url 'categories:customers_delete' c.pk %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
