{% extends "bases/base.html" %}

{% block content %}
<h2>Product Categories</h2>

<a href="{% url 'categories:products_create' %}" class="btn btn-primary mb-3">Add Category</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Parent</th>
            <th>Active</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for c in categories %}
        <tr>
            <td>{{ c.name }}</td>
            <td>{{ c.parent }}</td>
            <td>{{ c.is_active }}</td>
            <td>
                <a href="{% url 'categories:products_edit' c.pk %}" class="btn btn-sm btn-warning">Edit</a>
                <a href="{% url 'categories:products_delete' c.pk %}" class="btn btn-sm btn-danger">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
